<script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>
<script>
  setTimeout(() => {
    // Select all spans with class 'toc-section-number' inside the TOC
    const tocNumbers = document.querySelectorAll("#TOC .toc-section-number");

    tocNumbers.forEach((span) => {
      const num = parseInt(span.textContent.trim(), 10);
      if (!isNaN(num) && num >= 1 && num <= 9) {
        span.textContent = `0${num}`;
      }
    });
  }, 2000); // Adjust if rendering is delayed
</script>
<script>
  class CustomPagedHandler extends Paged.Handler {
    constructor(chunker, polisher, caller) {
      super(chunker, polisher, caller);
    }

    afterRendered(pages) {
      var covers = document.querySelectorAll(".cover-page-full");

      covers.forEach((cover) => {
        var page_container = cover.closest(".pagedjs_page");
        if (page_container) {
          var marginBottom = page_container.querySelector(
            ".pagedjs_margin-bottom"
          );
          if (marginBottom) {
            marginBottom.classList.add("custom-style");
          }

          var bottomCenter = page_container.querySelector(
            ".pagedjs_margin.pagedjs_margin-bottom-center.hasContent"
          );
          if (bottomCenter) {
            bottomCenter.classList.add("custom-style");
          }

          var bottomLeft = page_container.querySelector(
            ".pagedjs_margin.pagedjs_margin-bottom-left.hasContent"
          );
          if (bottomLeft) {
            bottomLeft.classList.add("page-break-icon");
          }
        }
      });
    }
  }

  Paged.registerHandlers(CustomPagedHandler);
</script>
<script>
  // script from https://pagedjs.org/plugins/endnotes-to-footnotes/
  const endNoteCalloutsQuery = ".footnote-ref";

  // the hook
  class endToFootNotes extends Paged.Handler {
    constructor(chunker, polisher, caller) {
      super(chunker, polisher, caller);
    }

    beforeParsed(content) {
      let callouts = content.querySelectorAll(endNoteCalloutsQuery);
      callouts.forEach((callout) => {
        let note = content.querySelector(callout.hash);
        if (!note) {
          return console.warn(
            `there is no note with the id of ${callout.hash}`
          );
        }
        let noteContent = `<span class="pagedjs-end-to-footnote">${note.innerHTML}</span>`;
        callout.insertAdjacentHTML("afterend", noteContent);
        callout.remove();
        note.remove();
      });
    }
  }
  Paged.registerHandlers(endToFootNotes);
</script>
<script>
  // Repeat table headers when a table breaks across pages.
  // paged.js does not clone <thead> into the table fragments it creates on
  // following pages, so long tables lose their header row after a page break.
  // This handler re-inserts the header (and any <colgroup>) into each
  // continuation fragment. Adapted from the canonical paged.js recipe:
  // https://github.com/pagedjs/pagedjs (repeating table headers).
  class OmniRepeatingTableHeaders extends Paged.Handler {
    constructor(chunker, polisher, caller) {
      super(chunker, polisher, caller);
      this.splitTablesRefs = [];
    }

    afterPageLayout(pageElement, page, breakToken, chunker) {
      this.chunker = chunker;
      this.splitTablesRefs = [];

      if (breakToken) {
        const node = breakToken.node;
        const tables = this.findAllAncestors(node, "table");
        if (node && node.tagName === "TABLE") {
          tables.push(node);
        }
        this.splitTablesRefs = tables
          .map((t) => t.dataset.ref)
          .filter(Boolean);
      }
    }

    layout(rendered, layout) {
      for (const ref of this.splitTablesRefs) {
        const renderedTable = rendered.querySelector(`[data-ref='${ref}']`);
        if (!renderedTable) continue;
        if (renderedTable.getAttribute("data-repeated-headers")) continue;

        const sourceTable = this.chunker.source.querySelector(
          `[data-ref='${ref}']`
        );
        if (!sourceTable) continue;

        this.repeatColgroup(sourceTable, renderedTable);
        this.repeatTHead(sourceTable, renderedTable);
        renderedTable.setAttribute("data-repeated-headers", true);
      }
    }

    repeatColgroup(sourceTable, renderedTable) {
      const colgroups = sourceTable.querySelectorAll("colgroup");
      const firstChild = renderedTable.firstChild;
      for (const cg of colgroups) {
        renderedTable.insertBefore(cg.cloneNode(true), firstChild);
      }
    }

    repeatTHead(sourceTable, renderedTable) {
      const thead = sourceTable.querySelector("thead");
      if (thead) {
        renderedTable.insertBefore(
          thead.cloneNode(true),
          renderedTable.firstChild
        );
      }
    }

    findAllAncestors(node, selector) {
      const ancestors = [];
      let el = node ? node.parentNode : null;
      while (el) {
        if (el.matches && el.matches(selector)) {
          ancestors.unshift(el);
        }
        el = el.parentNode;
      }
      return ancestors;
    }
  }

  Paged.registerHandlers(OmniRepeatingTableHeaders);
</script>
